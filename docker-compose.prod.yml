services:
  postgres:
    image: postgres:16-alpine
    container_name: agenthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: agenthub-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: agenthub-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      PORT: 4000
      WEB_URL: https://agenthub.nxme.site
      DATABASE_URL: postgresql://agenthub:${POSTGRES_PASSWORD}@postgres:5432/agenthub?schema=public
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      OPENCODE_URL: ${OPENCODE_URL:-}
      OPENCODE_BIN: ${OPENCODE_BIN:-opencode}
      OPENCODE_SESSION_ROOT: /opencode-sessions
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${MINIO_USER}
      STORAGE_SECRET_KEY: ${MINIO_PASSWORD}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-agenthub-prod}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
    volumes:
      - opencode_sessions:/opencode-sessions
    depends_on:
      - postgres
      - minio

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api-agenthub.nxme.site
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
    container_name: agenthub-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
  opencode_sessions:
