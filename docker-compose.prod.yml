services:
  postgres:
    image: postgres:16-alpine
    container_name: agenthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: agenthub-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: agenthub-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      PORT: 4000
      WEB_URL: https://agenthub.nxme.site
      JWT_SECRET: ${JWT_SECRET}
      DB_PATH: /data/agenthub.db
      OPENCODE_URL: ${OPENCODE_URL:-}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-}
    volumes:
      - api_data:/app/apps/api/data
    depends_on:
      - postgres
      - minio

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api-agenthub.nxme.site
    container_name: agenthub-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXTAUTH_URL: https://agenthub.nxme.site
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_PUBLIC_API_URL: https://api-agenthub.nxme.site
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
  api_data:
